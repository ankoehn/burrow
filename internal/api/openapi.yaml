          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/roles/{name}:
    get:
      tags: [roles]
      summary: Get a role (admin)
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Role detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [roles]
      summary: Update a custom role
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Empty' }
      responses:
        '204': { description: Updated. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [roles]
      summary: Delete a custom role
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ────────────────────────────────────────────────────────────────────────
  # Users (admin)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/users:
    get:
      tags: [users]
      summary: List users (admin)
      responses:
        '200':
          description: Paginated list of users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [users]
      summary: Create a user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                role: { type: string }
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/users/{id}:
    patch:
      tags: [users]
      summary: Update a user (role / status) — admin
      parameters: [ { $ref: '#/components/parameters/PathID' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string }
                status: { type: string, enum: [active, suspended] }
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [users]
      summary: Delete a user (admin)
      parameters: [ { $ref: '#/components/parameters/PathID' } ]
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ────────────────────────────────────────────────────────────────────────
  # Settings (admin)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/settings:
    get:
      tags: [settings]
      summary: Get admin settings (admin)
      responses:
        '200':
          description: Settings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [settings]
      summary: Replace admin settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Empty' }
      responses:
        '204': { description: Updated. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/settings/test-email:
    post:
      tags: [settings]
      summary: Send a test SMTP email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, format: email }
      responses:
        '200':
          description: Sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OK' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ────────────────────────────────────────────────────────────────────────
  # Clients
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/clients:
    get:
      tags: [clients]
      summary: List live clients (admin)
      responses:
        '200':
          description: List of clients.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/clients/{sessionID}:
    get:
      tags: [clients]
      summary: Get one live client (admin)
      parameters:
        - name: sessionID
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Client detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────────────────────────────────────────────────
  # Geo
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/geo/status:
    get:
      tags: [geo]
      summary: Global geo-lookup status (enabled, db path, age)
      responses:
        '200':
          description: Status envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  db_path: { type: string }
                  db_age_seconds: { type: integer, format: int64 }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ────────────────────────────────────────────────────────────────────────
  # MCP (burrowd mcp — JSON-RPC 2.0 tool server, spec Part P)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/mcp/status:
    get:
      tags: [mcp]
      summary: burrowd mcp listener status (enabled, listen, token_id)
      responses:
        '200':
          description: Status envelope (plaintext bearer is never returned).
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  listen: { type: string }
                  token_id: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/mcp/tools:
    get:
      tags: [mcp]
      summary: Closed inventory of MCP tools (name, description, parameters_schema, permission)
      responses:
        '200':
          description: Tool inventory.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    description: { type: string }
                    parameters_schema: { type: object }
                    permission: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ────────────────────────────────────────────────────────────────────────
  # Upstream credentials (spec Part B.2, v0.5.0 Task 5)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/upstream-credentials/slots:
    get:
      tags: [services]
      summary: List available vault slot handles (admin or ai:configure:any)
      responses:
        '200':
          description: Sorted list of slot handles registered in the env vault.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/services/{serviceID}/upstream-credential:
    get:
      tags: [services]
      summary: Read the upstream-credential binding for a service
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Binding (when bound) or {slot_present:false} (when unbound).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [services]
      summary: Bind an upstream credential slot to a service
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slot]
              properties:
                slot: { type: string }
                header_name: { type: string }
                header_format: { type: string }
      responses:
        '204': { description: Bound. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [services]
      summary: Unbind the upstream credential from a service
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Unbound (also returned when no binding existed). }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────────────────────────────────────────────────
  # Custom domains (v0.5.0 Task 7, spec D.2)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/services/{serviceID}/domains:
    get:
      tags: [services]
      summary: List custom domains bound to a service
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Array of custom domain objects (no key_pem).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [services]
      summary: Add a custom domain to a service
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname, cert_pem, key_pem]
              properties:
                hostname: { type: string }
                cert_pem: { type: string }
                key_pem: { type: string }
      responses:
        '201':
          description: Domain created.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Hostname already bound. }
  /api/v1/services/{serviceID}/domains/{did}:
    get:
      tags: [services]
      summary: Get a single custom domain by ID
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
        - name: did
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Domain object (no key_pem).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [services]
      summary: Replace the cert/key for a custom domain
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
        - name: did
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname, cert_pem, key_pem]
              properties:
                hostname: { type: string }
                cert_pem: { type: string }
                key_pem: { type: string }
      responses:
        '204': { description: Updated. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Hostname already bound. }
    delete:
      tags: [services]
      summary: Remove a custom domain
      parameters:
        - name: serviceID
          in: path
          required: true
          schema: { type: string }
        - name: did
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ────────────────────────────────────────────────────────────────────────
  # Events (SSE)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/events:
    get:
      tags: [events]
      summary: Server-sent events stream (dashboard refresh)
      responses:
        '200':
          description: text/event-stream.
          content:
            text/event-stream:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
