      responses:
        '200':
          description: Count purged.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/cache/semantic/entries:
    delete:
      tags: [cache]
      summary: Purge ALL semantic cache entries (admin / ai:configure:any)
      description: >
