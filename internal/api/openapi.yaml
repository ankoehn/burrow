openapi: 3.0.3
info:
  title: Burrow JSON API
  description: |
    The hand-written canonical OpenAPI v3 description of the Burrow JSON API
    (unified across v0.2.0, v0.3.0, and v0.4.0).

    Coverage is locked by `TestOpenAPI_RouteCoverage` in
    `internal/api/openapi_test.go`: every route the chi mux answers must
    appear in this document or the build fails. Health probes (`/healthz`,
    `/readyz`) and the doc-serving endpoints (`/api/v1/openapi.{yaml,json}`)
    are excluded by convention.

    Schemas are intentionally minimal — the goal is shape coverage for SDK
    code-generators (TypeScript-fetch, Go), not exhaustive validation. Full
    schemas can be filled in incrementally without invalidating downstream
    SDKs (additive only).
  version: 0.4.0
  license:
    name: MIT
servers:
  - url: https://{host}
    variables:
      host:
        default: localhost:8080
        description: Burrow control-plane host.

tags:
  - name: auth
    description: Session login, logout, password change, passkey enrolment.
  - name: users
    description: Admin user management.
  - name: roles
    description: Roles + permission catalog (editable custom roles).
  - name: sessions
    description: Per-user session list / revoke.
  - name: tokens
    description: Personal client tokens (burrowc connect).
  - name: tunnels
    description: Live tunnels owned by the caller.
  - name: services
    description: Durable per-service config (access mode, api-keys, policy, ip/geo, inspector, cache).
  - name: cache
    description: Exact-match prompt cache (settings, stats, purge).
  - name: redaction
    description: PII / secret redaction rules + preview.
  - name: guardrails
    description: Prompt-injection guardrails settings.
  - name: models
    description: Model alias registry.
  - name: rate-limits
    description: Quota + rate-limit CRUD and usage.
  - name: cost
    description: Cost pricing + budgets + summary / export.
  - name: inspector
    description: Per-service request inspector (ring buffer, replay, SSE).
  - name: audit
    description: Audit log events + chain verify / export / fingerprint.
  - name: webhooks
    description: Outbound HMAC webhooks (CRUD + deliveries + test/pause/resume).
  - name: automation
    description: Bearer-token automation API.
  - name: backups
    description: Backup / restore JSON API.
  - name: geo
    description: Global geo lookup status.
  - name: settings
    description: Admin settings (config + SMTP test).
  - name: clients
    description: Live client (control session) overview.
  - name: events
    description: Server-sent events stream (dashboard refresh).
  - name: metrics
    description: Prometheus 0.0.4 scrape endpoint.

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: burrow_session
      description: |
        Session cookie issued by POST /api/v1/auth/login. State-changing
        cookie-authed requests MUST also send the burrow_csrf double-submit
        header (`X-CSRF-Token`).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: bua_<token>
      description: |
        Automation bearer token (`Authorization: Bearer bua_...`). Bypasses
        CSRF (the token IS the CSRF defense). Permissions are the
        intersection of the user's current role and the set declared at
        mint time.
    CSRFToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        Double-submit token for cookie-authed state-changing requests.
        Value mirrors the burrow_csrf cookie.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
    Empty:
      type: object
      description: Empty JSON object response.
    OK:
      type: object
      properties:
        ok:
          type: boolean
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        status: { type: string, enum: [active, suspended] }
        created_at: { type: string, format: date-time }
        last_login_at: { type: string, format: date-time, nullable: true }
    Service:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [http, tcp] }
        access_mode: { type: string }
        remote_port: { type: integer }
        local_addr: { type: string }
        connected: { type: boolean }
    Tunnel:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [http, tcp] }
        remote_port: { type: integer }
        local_addr: { type: string }
        bytes_in: { type: integer, format: int64 }
        bytes_out: { type: integer, format: int64 }
        connected: { type: boolean }
    Session:
      type: object
      properties:
        id: { type: string }
        user_agent: { type: string }
        ip: { type: string }
        created_at: { type: string, format: date-time }
    Token:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }
    AccessModeReq:
      type: object
      required: [mode]
      properties:
        mode: { type: string }
        header: { type: string }
        mtls_ca_pem: { type: string }

  responses:
    Unauthorized:
      description: Missing / invalid session or bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but the caller lacks permission.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema: { type: string }
    PathServiceID:
      name: serviceID
      in: path
      required: true
      schema: { type: string }

# Default security: cookie+CSRF or bearer. Individual public routes override
# with `security: []`.
security:
  - CookieAuth: []
    CSRFToken: []
  - BearerAuth: []

paths:
  # ────────────────────────────────────────────────────────────────────────
  # Prometheus scrape (outside /api/v1 by convention; gated by metrics:read)
  # ────────────────────────────────────────────────────────────────────────
  /metrics:
    get:
      tags: [metrics]
      summary: Prometheus 0.0.4 scrape (closed metric set)
      description: |
        Returns the Burrow closed-metric set in Prometheus text exposition
        format. Gated by admin OR the `metrics:read` permission.
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ────────────────────────────────────────────────────────────────────────
  # Auth (login is public; everything else requires a session)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Password login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Session cookie issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429':
          description: Rate-limited (per-IP or global).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Clear the session cookie
      responses:
        '204': { description: Session cleared. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/change-password:
    post:
      tags: [auth]
      summary: Change the caller's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password }
      responses:
        '204': { description: Password changed. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/webauthn/login/begin:
    post:
      tags: [auth]
      summary: Begin a WebAuthn (passkey) login ceremony
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: WebAuthn PublicKeyCredentialRequestOptions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '503':
          description: WebAuthn unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/webauthn/login/finish:
    post:
      tags: [auth]
      summary: Finish a WebAuthn (passkey) login ceremony
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Empty' }
      responses:
        '200':
          description: Session cookie issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/webauthn/register/begin:
    post:
      tags: [auth]
      summary: Begin passkey enrolment (requires session)
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Empty' }
      responses:
        '200':
          description: WebAuthn PublicKeyCredentialCreationOptions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/webauthn/register/finish:
    post:
      tags: [auth]
      summary: Finish passkey enrolment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Empty' }
      responses:
        '200':
          description: Credential registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/webauthn/credentials:
    get:
      tags: [auth]
      summary: List the caller's registered passkeys
      responses:
        '200':
          description: List of credential summaries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/webauthn/credentials/{id}:
    delete:
      tags: [auth]
      summary: Delete a passkey credential
      parameters: [ { $ref: '#/components/parameters/PathID' } ]
      responses:
        '204': { description: Credential removed. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/me:
    get:
      tags: [auth]
      summary: Current authenticated principal
      responses:
        '200':
          description: The signed-in user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ────────────────────────────────────────────────────────────────────────
  # Sessions
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/sessions:
    get:
      tags: [sessions]
      summary: List the caller's active sessions
      responses:
        '200':
          description: List of session records.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Session' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/sessions/{id}:
    delete:
      tags: [sessions]
      summary: Revoke one of the caller's sessions
      parameters: [ { $ref: '#/components/parameters/PathID' } ]
      responses:
        '204': { description: Session revoked. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/sessions/revoke-all:
    post:
      tags: [sessions]
      summary: Revoke every session except the current one
      responses:
        '200':
          description: Count of sessions revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ────────────────────────────────────────────────────────────────────────
  # Tokens (personal client tokens)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/tokens:
    get:
      tags: [tokens]
      summary: List the caller's client tokens
      responses:
        '200':
          description: List of tokens.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Token' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [tokens]
      summary: Issue a new client token (plaintext returned ONCE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200':
          description: Token created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  token: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/tokens/{id}:
    delete:
      tags: [tokens]
      summary: Revoke a client token
      parameters: [ { $ref: '#/components/parameters/PathID' } ]
      responses:
        '204': { description: Token revoked. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────────────────────────────────────────────────
  # Tunnels (live runtime view) + v0.2 back-compat access-mode setter
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/tunnels:
    get:
      tags: [tunnels]
      summary: List the caller's live tunnels
      responses:
        '200':
          description: List of tunnels.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Tunnel' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/tunnels/{id}/access-mode:
    put:
      tags: [tunnels]
      summary: Set tunnel access mode (v0.2 back-compat — delegates to services)
      parameters: [ { $ref: '#/components/parameters/PathID' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccessModeReq' }
      responses:
        '204': { description: Access mode set. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────────────────────────────────────────────────
  # Services
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/services:
    get:
      tags: [services]
      summary: List services visible to the caller
      responses:
        '200':
          description: List of services.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Service' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/services/{serviceID}:
    get:
      tags: [services]
      summary: Service detail (config + live state)
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      responses:
        '200':
          description: Service detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Service' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/services/{serviceID}/access-mode:
    put:
      tags: [services]
      summary: Set the service's access mode
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccessModeReq' }
      responses:
        '204': { description: Access mode set. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/services/{serviceID}/api-keys:
    get:
      tags: [services]
      summary: List per-service API keys
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      responses:
        '200':
          description: List of api-key summaries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [services]
      summary: Mint a new per-service API key (plaintext returned ONCE)
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200':
          description: Key created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  key: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/services/{serviceID}/api-keys/{id}:
    delete:
      tags: [services]
      summary: Revoke a per-service API key
      parameters:
        - { $ref: '#/components/parameters/PathServiceID' }
        - { $ref: '#/components/parameters/PathID' }
      responses:
        '204': { description: Key revoked. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/services/{serviceID}/access-policy:
    get:
      tags: [services]
      summary: Get the role allowlist for burrow_login access
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      responses:
        '200':
          description: List of role names.
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [services]
      summary: Replace the role allowlist
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roles:
                  type: array
                  items: { type: string }
      responses:
        '204': { description: Policy updated. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/services/{serviceID}/ip-geo:
    get:
      tags: [services]
      summary: Get per-service IP / Geo allow / deny rules
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      responses:
        '200':
          description: IP/Geo configuration.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [services]
      summary: Replace per-service IP / Geo rules
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Empty' }
      responses:
        '204': { description: Updated. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/services/{serviceID}/cache/entries:
    delete:
      tags: [services, cache]
      summary: Purge per-service exact-cache entries
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      responses:
        '200':
          description: Count purged.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/services/{serviceID}/ai-config:
    put:
      tags: [services, cache]
      summary: Store per-service AI gateway configuration
      description: >
        Persists the service-level AI config blob. Validates
        cache.semantic.min_similarity (must be in [0.0, 1.0]) and
        cache.semantic.embedding_mode (must be "local" or "none"). All
        other fields are stored as-is. Permission: service owner OR
        ai:configure:any (admin).
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Empty' }
      responses:
        '204': { description: Saved. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────────────────────────────────────────────────
  # Inspector (per-service ring buffer + replay + SSE)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/services/{serviceID}/inspector/requests:
    get:
      tags: [inspector]
      summary: List captured requests
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      responses:
        '200':
          description: List of request envelopes.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/services/{serviceID}/inspector/requests/{rid}:
    get:
      tags: [inspector]
      summary: Get a captured request envelope
      parameters:
        - { $ref: '#/components/parameters/PathServiceID' }
        - name: rid
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Request envelope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/services/{serviceID}/inspector/requests/{rid}/replay:
    post:
      tags: [inspector]
      summary: Re-fire the captured request through the proxy chain
      parameters:
        - { $ref: '#/components/parameters/PathServiceID' }
        - name: rid
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Replay result envelope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Replay engine unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/services/{serviceID}/inspector/requests/{rid}/replay-compare:
    post:
      tags: [inspector]
      summary: Replay and diff against the original response
      parameters:
        - { $ref: '#/components/parameters/PathServiceID' }
        - name: rid
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Diff envelope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Empty' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/services/{serviceID}/inspector/stream:
    get:
      tags: [inspector]
      summary: SSE stream of newly-captured requests (no timeout, no CSRF)
      parameters: [ { $ref: '#/components/parameters/PathServiceID' } ]
      responses:
        '200':
          description: text/event-stream.
          content:
            text/event-stream:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ────────────────────────────────────────────────────────────────────────
  # Cache (global settings + stats + purge)
  # ────────────────────────────────────────────────────────────────────────
  /api/v1/cache/settings:
