# internal/cost/pricing.yaml — bundled default pricing table.
#
# Currency is USD per 1,000,000 tokens. Operator may override via
# PUT /api/v1/cost/pricing or by setting BURROW_PRICING_PATH=/path/to/yaml
# (Task 24 wires the env var). NEVER fetched online — Burrow has no
# phone-home for prices (spec Part F invariant).
#
# Version is the date the bundle was last revised; pin to a real date so the
# UI can show "pricing last updated YYYY-MM-DD" without ambiguity. Bump when
# any entry changes.
version: "2026-05-19"
entries:
