linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - revive
    - gosec
    - unused
    - ineffassign
    - misspell

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
