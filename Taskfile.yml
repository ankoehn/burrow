version: "3"

vars:
  BINDIR: bin
  VERSION:
    sh: git describe --tags --always --dirty
  LDFLAGS: -X github.com/ankoehn/burrow/internal/version.Version={{.VERSION}}

tasks:
  build:
    desc: Build burrowd and burrow into ./bin
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BINDIR}}/burrowd ./cmd/server
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BINDIR}}/burrow ./cmd/client

  test:
    desc: Run tests with race detector and coverage
    cmds:
      # ./web is non-recursive so go test skips the gitignored, npm-generated
      # web/node_modules tree (flatted ships stray .go); cmd/internal recurse.
      - go test -race -cover ./cmd/... ./internal/... ./web

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  dev:
    desc: Hot-reload the server (requires air)
    cmds:
      - air -c .air.toml

  clean:
    desc: Remove build artifacts
    cmds:
      - cmd: rm -rf {{.BINDIR}} dist tmp
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "Remove-Item -Recurse -Force -ErrorAction SilentlyContinue {{.BINDIR}}, dist, tmp"
        platforms: [windows]

  release-snapshot:
    desc: Build a local snapshot release with GoReleaser
    cmds:
      - goreleaser release --snapshot --clean

  certs:
    desc: Generate local dev TLS certs into ./certs (idempotent; DEV ONLY)
    cmds:
      - cmd: ./scripts/dev-certs.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "go run ./cmd/gencerts"
        platforms: [windows]

  e2e:up:
    desc: Build + start the FULL e2e stack detached (leaves it running)
    cmds:
      - docker compose -f test/harness/compose.full.yml up -d --build --wait

  e2e:down:
    desc: Stop the full e2e stack and remove its named volumes
    cmds:
      - docker compose -f test/harness/compose.full.yml down --volumes

  integration:smoke:
    desc: "Tier 1: minimal data-plane curl gate (relay + 1 client; up/assert/down)"
    cmds:
      - bash test/integration/smoke.sh

  integration:smoke-full:
    desc: "Tier 1: full-stack data-plane curl gate (dashboard + 3 TCP + AI SSE)"
    cmds:
      - bash test/integration/smoke-full.sh

  e2e:run:
    desc: "Tier 2: bring up full stack + run the Playwright UI suite (up/test/down)"
    cmds:
      - bash test/e2e/run.sh

  e2e:user:
    desc: "Tier 3 helper: scripted user-acceptance walkthrough (mint -> connect -> ... -> restart)"
    cmds:
      - bash test/manual/smoke-user.sh

  e2e:lab:
    desc: Bring up the full e2e lab and print access credentials + endpoints
    cmds:
      - docker compose -f test/harness/compose.full.yml up -d --wait
      - echo ""
      - echo "  Burrow e2e lab is up."
      - echo ""
      - echo "  Dashboard:   http://localhost:8080"
      - echo "  Admin email: admin@e2e.local"
      - echo "  Password:    e2e-pass"
      - echo ""
      - echo "  Ports:"
      - echo "    8080  UI + admin API"
      - echo "    7000  client control plane"
      - echo "    8443  HTTPS proxy ingress (host-routed tunnels)"
      - echo "    9001  TCP tunnel (ai)"
      - echo "    9002  TCP tunnel (tcp-echo)"
      - echo "    9003  TCP tunnel (multi-a)"
      - echo "    9004  TCP tunnel (multi-b)"
      - echo "    7800  MCP listener"
      - echo ""
